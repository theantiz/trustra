spring.application.name=Trustra

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:${USER}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

trustra.mock-seed.enabled=true
trustra.scheduling.recalculation.enabled=true
trustra.scheduling.recalculation.fixed-rate-ms=3600000
trustra.frontend.origin=${TRUSTRA_FRONTEND_ORIGIN:http://localhost:3000}
